    <script>
        // Notification Logic
        const notiTrigger = document.getElementById('notification-trigger');
        const notiDropdown = document.getElementById('notification-dropdown');
        
        notiTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            notiDropdown.classList.toggle('hidden');
            closeSearch(); 
        });

        // Search Logic
        const searchTrigger = document.getElementById('search-trigger');
        const searchInput = document.getElementById('search-input');
        const searchWrapper = document.getElementById('search-wrapper');
        const searchIcon = document.getElementById('search-icon');

        searchTrigger.addEventListener('click', () => {
            const isClosed = searchInput.classList.contains('w-0');
            if (isClosed) {
                searchInput.classList.remove('w-0', 'opacity-0', 'pointer-events-none');
                searchInput.classList.add('w-[180px]', 'opacity-100', 'px-3');
                searchIcon.classList.replace('ri-search-line', 'ri-close-line');
                searchWrapper.classList.add('bg-black/40');
                searchInput.focus();
                notiDropdown.classList.add('hidden');
            } else {
                if (searchInput.value.trim() === "") closeSearch();
                else console.log("Searching:", searchInput.value);
            }
        });

        function closeSearch() {
            searchInput.classList.add('w-0', 'opacity-0', 'pointer-events-none');
            searchInput.classList.remove('w-[180px]', 'opacity-100', 'px-3');
            searchIcon.classList.replace('ri-close-line', 'ri-search-line');
            searchWrapper.classList.remove('bg-black/40');
            searchInput.value = "";
        }

        // Global Click to close
        document.addEventListener('click', (e) => {
            if (!notiDropdown.contains(e.target) && e.target !== notiTrigger) notiDropdown.classList.add('hidden');
            if (!searchWrapper.contains(e.target)) closeSearch();
        });
    </script>

    <script>
        // 1. Hàm Load thông tin khi vào trang
        function initProfile() {
            const userData = JSON.parse(localStorage.getItem('currentUser'));

            if (!userData) {
                alert("Bạn cần đăng nhập để xem hồ sơ!");
                window.location.href = "login.html";
                return;
            }

            // Gán dữ liệu vào HTML
            document.getElementById('profile-display-name').innerText = userData.username;
            document.getElementById('profile-input-name').value = userData.username;
            document.getElementById('profile-input-email').value = userData.email || "ytbtagamer@gmail.com";
            
            if (userData.avatar) {
                document.getElementById('user-avatar').src = userData.avatar;
            }
        }

        // 2. Xử lý đổi Avatar
        const avatarUpload = document.getElementById('avatar-upload');
        const userAvatar = document.getElementById('user-avatar');

        avatarUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    userAvatar.src = base64Image;

                    // Lưu vào localStorage
                    let userData = JSON.parse(localStorage.getItem('currentUser'));
                    userData.avatar = base64Image;
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    alert("Đã thay đổi ảnh đại diện!");
                }
                reader.readAsDataURL(file);
            }
        });

        // 3. Hàm cập nhật tên hiển thị
        function updateProfile() {
            const newName = document.getElementById('profile-input-name').value;
            let userData = JSON.parse(localStorage.getItem('currentUser'));

            if (newName.trim() === "") {
                alert("Tên không được để trống!");
                return;
            }

            userData.username = newName;
            localStorage.setItem('currentUser', JSON.stringify(userData));
            document.getElementById('profile-display-name').innerText = newName;
            alert("Cập nhật thông tin thành công!");
        }

        // 4. Hàm đăng xuất
        function handleLogout() {
            if(confirm("Bạn có chắc muốn đăng xuất?")) {
                localStorage.removeItem('currentUser');
                window.location.href = "index.html";
            }
        }

        // Khởi chạy khi trang sẵn sàng
        document.addEventListener('DOMContentLoaded', initProfile);

        // --- LOGIC CHO LỊCH SỬ BÀI VIẾT ---

// 1. Hàm hiển thị lịch sử
function displayViewHistory() {
    const historyList = document.getElementById('history-list');
    // Lấy dữ liệu từ localStorage (mảng các bài viết)
    const history = JSON.parse(localStorage.getItem('viewHistory')) || [];

    if (history.length === 0) {
        historyList.innerHTML = `
            <div class="text-center py-10">
                <p class="text-gray-600 text-xs italic">Chưa có bài viết nào được xem</p>
            </div>
        `;
        return;
    }

    // Đổ dữ liệu ra HTML (Đảo ngược mảng để bài mới nhất lên đầu)
    historyList.innerHTML = history.reverse().map(item => `
        <div class="flex items-center gap-4 p-3 rounded-2xl bg-white/[0.02] border border-white/5 hover:bg-white/[0.05] transition-all group">
            <div class="w-24 h-16 rounded-lg overflow-hidden flex-shrink-0">
                <img src="${item.image}" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 min-w-0">
                <h4 class="text-white font-bold text-sm truncate group-hover:text-cyan-400">${item.title}</h4>
                <p class="text-[10px] text-gray-500 mt-1 uppercase">
                    ${item.time} • <span class="text-cyan-500/70 italic">${item.category}</span>
                </p>
            </div>
            <a href="${item.link}" class="p-2 text-gray-600 hover:text-white transition-colors">
                <i class="ri-external-link-line"></i>
            </a>
        </div>
    `).join('');
}

// 2. Hàm xóa lịch sử
function clearHistory() {
    if (confirm("Bạn có chắc chắn muốn xóa toàn bộ lịch sử đã xem?")) {
        localStorage.removeItem('viewHistory');
        displayViewHistory(); // Cập nhật lại giao diện ngay lập tức
    }
}

// --- CẬP NHẬT LẠI HÀM KHỞI CHẠY ---
function initProfile() {
    const userData = JSON.parse(localStorage.getItem('currentUser'));

    if (!userData) {
        alert("Bạn cần đăng nhập để xem hồ sơ!");
        window.location.href = "login.html";
        return;
    }

    document.getElementById('profile-display-name').innerText = userData.username;
    document.getElementById('profile-input-name').value = userData.username;
    document.getElementById('profile-input-email').value = userData.email || "ytbtagamer@gmail.com";
    
    if (userData.avatar) {
        document.getElementById('user-avatar').src = userData.avatar;
    }

    // Gọi hàm hiển thị lịch sử
    displayViewHistory();
}

document.addEventListener('DOMContentLoaded', initProfile);

function displayViewHistory() {
    const historyList = document.getElementById('history-list');
    if(!historyList) return;

    const history = JSON.parse(localStorage.getItem('viewHistory')) || [];

    if (history.length === 0) {
        historyList.innerHTML = `<p class="text-center text-gray-500 text-xs py-10 uppercase font-bold tracking-widest opacity-50">Lịch sử trống</p>`;
        return;
    }

    // Hiển thị 10 bài gần nhất (mới nhất lên đầu)
    historyList.innerHTML = history.slice().reverse().map(item => `
        <div class="flex items-center gap-4 p-3 rounded-2xl bg-white/[0.02] border border-white/5 hover:bg-white/[0.05] transition-all group">
            <div class="w-24 h-16 rounded-lg overflow-hidden flex-shrink-0">
                <img src="${item.image}" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 min-w-0">
                <h4 class="text-white font-bold text-sm truncate group-hover:text-cyan-400">${item.title}</h4>
                <p class="text-[10px] text-gray-500 mt-1 uppercase italic">${item.time} • <span class="text-cyan-500">${item.category}</span></p>
            </div>
            <a href="${item.link}" class="p-2 text-gray-600 hover:text-white transition-colors">
                <i class="ri-external-link-line"></i>
            </a>
        </div>
    `).join('');
}

// Chạy khi trang profile load xong
document.addEventListener('DOMContentLoaded', displayViewHistory);
